services:

  # ── Ollama (local LLM server) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: edutech-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      # Use ollama binary itself — curl is not available in the ollama image
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Model puller (runs once, exits when models are ready) ───────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: edutech-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling ${OLLAMA_TEXT_MODEL:-llama3.2}..."
        ollama pull ${OLLAMA_TEXT_MODEL:-llama3.2}
        echo "Pulling ${OLLAMA_VISION_MODEL:-qwen2.5vl:3b}..."
        ollama pull ${OLLAMA_VISION_MODEL:-qwen2.5vl:3b}
        echo "All models ready."
    restart: on-failure:3   # retry up to 3 times if pull fails (e.g. network blip)

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutech-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TEXT_MODEL=${OLLAMA_TEXT_MODEL:-llama3.2}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-qwen2.5vl:3b}
      - RENDER_DPI=${RENDER_DPI:-100}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - excel_outputs:/app/outputs
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully   # wait for models to finish downloading
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: edutech-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:      # persists downloaded model weights across restarts
  excel_outputs:    # persists generated Excel files

networks:
  default:
    name: edutech-network
